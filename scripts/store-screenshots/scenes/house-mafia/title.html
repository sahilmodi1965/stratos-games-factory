<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>HM — Title hero</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body {
    background:
      radial-gradient(ellipse 90% 60% at 50% 35%, rgba(255, 45, 123, 0.22), transparent 55%),
      radial-gradient(ellipse 70% 50% at 50% 100%, rgba(0, 240, 255, 0.18), transparent 60%),
      radial-gradient(circle at 12% 18%, rgba(255,255,255,0.06) 0px, transparent 80px),
      radial-gradient(circle at 88% 78%, rgba(255,255,255,0.05) 0px, transparent 100px),
      #0a0a0f;
  }
  .stage {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 70px 28px 30px;
  }
  .top-cluster {
    margin-top: 10px;
    text-align: center;
    margin-bottom: 30px;
  }
  .eyebrow {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 12px;
  }
  .wordmark {
    font-weight: 900;
    font-size: 76px;
    line-height: 0.94;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, var(--pink) 0%, #ff5cb8 30%, var(--cyan) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 28px rgba(255, 45, 123, 0.55));
    margin-bottom: 14px;
  }
  .pitch {
    font-size: 16px;
    font-weight: 600;
    color: var(--ink-soft);
    line-height: 1.4;
    max-width: 320px;
    margin: 0 auto;
  }
  .pitch .hl-pink { color: var(--pink); font-weight: 800; }
  .pitch .hl-cyan { color: var(--cyan); font-weight: 800; }

  .role-strip {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin: 30px 0;
  }
  .chip {
    width: 64px;
    height: 84px;
    border-radius: 14px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    position: relative;
  }
  .chip.mafia { border-color: var(--pink); box-shadow: 0 0 20px rgba(255, 45, 123, 0.3); }
  .chip.detective { border-color: var(--cyan); box-shadow: 0 0 20px rgba(0, 240, 255, 0.3); }
  .chip.guest { border-color: var(--yellow); box-shadow: 0 0 20px rgba(255, 225, 86, 0.25); }
  .chip .em { font-size: 28px; line-height: 1; }
  .chip .nm {
    font-size: 9px;
    font-weight: 900;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .chip.mafia .nm { color: var(--pink); }
  .chip.detective .nm { color: var(--cyan); }
  .chip.guest .nm { color: var(--yellow); }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: auto;
  }
  .btn {
    padding: 16px;
    border: 0;
    border-radius: 14px;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
  }
  .btn.primary {
    background: linear-gradient(135deg, var(--pink), var(--cyan));
    color: #fff;
    box-shadow: 0 0 28px rgba(255, 45, 123, 0.5);
  }
  .btn.secondary {
    background: var(--surface);
    color: var(--ink);
    border: 1.5px solid var(--border);
  }
  .btn .sub {
    display: block;
    font-size: 11px;
    font-weight: 700;
    opacity: 0.85;
    letter-spacing: 0.18em;
    margin-top: 2px;
  }
  .meta {
    text-align: center;
    margin-top: 14px;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="top-cluster">
      <div class="eyebrow">A Stratos Games party game</div>
      <div class="wordmark">House<br>Mafia</div>
      <div class="pitch">Find the <span class="hl-pink">mafia</span> hiding among your friends. <span class="hl-cyan">3-minute rounds</span>, real-time voting, no setup.</div>
    </div>

    <div class="role-strip">
      <div class="chip mafia"><div class="em">🔪</div><div class="nm">Mafia</div></div>
      <div class="chip detective"><div class="em">🔍</div><div class="nm">Detective</div></div>
      <div class="chip guest"><div class="em">🥂</div><div class="nm">Guest</div></div>
      <div class="chip"><div class="em">⚕️</div><div class="nm">Doctor</div></div>
    </div>

    <div class="actions">
      <button class="btn primary">
        Create room
        <span class="sub">Get a 4-letter code</span>
      </button>
      <button class="btn secondary">
        Join room
        <span class="sub">Enter friend's code</span>
      </button>
      <button class="btn secondary">
        Pass &amp; play
        <span class="sub">One device · No internet</span>
      </button>
    </div>

    <div class="meta">4–8 players · Free · No ads in play</div>
  </div>
</body>
</html>
