<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>HM — Role reveal (Mafia)</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body {
    background:
      radial-gradient(ellipse 80% 50% at 50% 30%, rgba(255, 45, 123, 0.25), transparent 60%),
      radial-gradient(ellipse 100% 60% at 50% 100%, rgba(255, 45, 123, 0.15), transparent 70%),
      #0a0a0f;
  }
  .stage {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 32px;
  }
  .secret-tag {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 14px;
  }
  .tag-h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.005em;
    color: var(--ink);
    margin-bottom: 36px;
    text-align: center;
  }
  .card {
    width: 280px;
    height: 360px;
    border-radius: 24px;
    background: linear-gradient(180deg, #2a0a18, #4a0820);
    border: 3px solid var(--pink);
    box-shadow:
      0 0 40px rgba(255, 45, 123, 0.6),
      0 0 80px rgba(255, 45, 123, 0.3),
      0 20px 50px rgba(0,0,0,0.65),
      inset 0 0 30px rgba(255, 45, 123, 0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 36px;
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(255, 45, 123, 0.3);
    border-radius: 16px;
    pointer-events: none;
  }
  .card-emoji {
    font-size: 96px;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 24px rgba(255, 45, 123, 0.6));
  }
  .card-role {
    font-weight: 900;
    font-size: 38px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--pink);
    text-shadow: 0 0 24px var(--pink);
    margin-bottom: 4px;
  }
  .card-team {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .objective {
    text-align: center;
    margin-bottom: 28px;
    max-width: 320px;
  }
  .objective .label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }
  .objective .text {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--ink);
  }
  .objective .text .h {
    color: var(--pink);
    font-weight: 800;
  }

  .ready-btn {
    background: linear-gradient(135deg, var(--pink), #ff5cb8);
    border: 0;
    border-radius: 14px;
    padding: 16px 60px;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #fff;
    box-shadow: 0 0 24px rgba(255, 45, 123, 0.5), 0 6px 16px rgba(0,0,0,0.4);
  }
  .pass-hint {
    margin-top: 18px;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="topbar-min"><div class="tiny-mark">House Mafia · Role reveal</div></div>

  <div class="stage">
    <div class="secret-tag">Don't show others</div>
    <div class="tag-h1">Ripon, your role is…</div>

    <div class="card">
      <div class="card-emoji">🔪</div>
      <div class="card-role">Mafia</div>
      <div class="card-team">Eliminate the guests</div>
    </div>

    <div class="objective">
      <div class="label">Tonight</div>
      <div class="text">You'll secretly choose <span class="h">one player</span> to eliminate. Stay quiet by day. Don't get voted out.</div>
    </div>

    <button class="ready-btn">I've got it</button>
    <div class="pass-hint">Pass the phone to the next player</div>
  </div>
</body>
</html>
