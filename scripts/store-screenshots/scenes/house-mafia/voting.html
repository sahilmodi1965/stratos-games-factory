<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>HM — Day vote</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .stage {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 70px 24px 24px;
  }
  .phase-pill {
    display: inline-flex;
    align-self: center;
    align-items: center;
    gap: 6px;
    background: rgba(255, 225, 86, 0.15);
    border: 1px solid var(--yellow);
    color: var(--yellow);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .phase-h {
    text-align: center;
    font-weight: 900;
    font-size: 30px;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  .phase-h .h {
    color: var(--yellow);
    text-shadow: 0 0 20px var(--yellow);
  }
  .phase-sub {
    text-align: center;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 22px;
  }
  .timer {
    align-self: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 22px;
  }
  .timer .num {
    color: var(--pink);
    font-feature-settings: 'tnum';
    margin-left: 6px;
  }

  .vote-list {
    flex: 1 1 auto;
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }
  .vote {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    position: relative;
  }
  .vote.selected {
    border-color: var(--yellow);
    background: rgba(255, 225, 86, 0.1);
    box-shadow: 0 0 24px rgba(255, 225, 86, 0.3);
  }
  .vote.eliminated {
    opacity: 0.4;
  }
  .vote.eliminated .name { text-decoration: line-through; font-style: italic; }
  .av {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .av.a { background: linear-gradient(135deg, #ff2d7b, #c2185b); }
  .av.b { background: linear-gradient(135deg, #00f0ff, #0099cc); }
  .av.c { background: linear-gradient(135deg, #ffe156, #f9a825); }
  .av.d { background: linear-gradient(135deg, #69f0ae, #00bfa5); }
  .av.e { background: linear-gradient(135deg, #b388ff, #7c4dff); }
  .av.f { background: linear-gradient(135deg, #ffab40, #ef6c00); }
  .name {
    flex: 1 1 auto;
    font-weight: 700;
    font-size: 15px;
  }
  .vote-tally {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .v-bubble {
    font-size: 14px;
    width: 24px; height: 24px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
  }
  .v-count {
    font-size: 12px;
    font-weight: 900;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
    margin-left: 6px;
  }
  .vote.selected .v-count { color: var(--yellow); }
  .you-tag {
    font-size: 9px;
    font-weight: 900;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: var(--pink);
    color: #fff;
    padding: 3px 7px;
    border-radius: 999px;
    margin-left: 4px;
  }

  .vote-cta {
    margin-top: 14px;
    background: var(--yellow);
    color: #1a1500;
    border-radius: 14px;
    padding: 14px;
    text-align: center;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    box-shadow: 0 0 24px rgba(255, 225, 86, 0.4);
  }
</style>
</head>
<body>
  <div class="topbar-min"><div class="tiny-mark">House Mafia · Day 2 · Vote</div></div>

  <div class="stage">
    <div class="phase-pill">☀ Day 2 · Discussion ended</div>
    <div class="phase-h">Who's the <span class="h">mafia</span>?</div>
    <div class="phase-sub">Tap the player you want to eliminate</div>
    <div class="timer">⏱ <span class="num">00:18</span> left</div>

    <div class="vote-list">
      <div class="vote">
        <div class="av b">🦊</div>
        <div class="name">Sahil</div>
        <div class="vote-tally"><div class="v-bubble">🐺</div><div class="v-count">·1</div></div>
      </div>
      <div class="vote">
        <div class="av a">🐺</div>
        <div class="name">Ripon <span class="you-tag">You</span></div>
        <div class="vote-tally"><div class="v-count">0</div></div>
      </div>
      <div class="vote selected">
        <div class="av c">🦉</div>
        <div class="name">Anika</div>
        <div class="vote-tally">
          <div class="v-bubble">🐯</div>
          <div class="v-bubble">🦋</div>
          <div class="v-count">·2</div>
        </div>
      </div>
      <div class="vote">
        <div class="av d">🐯</div>
        <div class="name">Jay</div>
        <div class="vote-tally"><div class="v-count">0</div></div>
      </div>
      <div class="vote eliminated">
        <div class="av e">🦋</div>
        <div class="name">Mei</div>
        <div class="vote-tally"><div class="v-count">Out</div></div>
      </div>
    </div>

    <div class="vote-cta">Lock vote · Anika</div>
  </div>
</body>
</html>
