<!doctype html>
<html lang="en" data-theme="default">
<head>
<meta charset="utf-8">
<title>AP — Mid-Expert (Level 80)</title>
<link rel="stylesheet" href="_shared.css">
<style>
  /* mid-expert specific: dense scatter of L/straight/U arrows on dot grid */
  .board-svg { padding: 0 16px; }
</style>
</head>
<body>
  <header class="topbar">
    <button class="icon-btn" aria-label="Back">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="title">Level 80</div>
    <button class="icon-btn" aria-label="Settings">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </header>

  <div class="hud">
    <div class="count">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M13 2 4 14h7l-2 8 9-12h-7l2-8z"/></svg>
      <span>27</span>
    </div>
    <div class="lives">
      <svg class="heart-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.35-9.5-8.5C.5 9 2 5 6 5c2 0 3.5 1 4.5 2.5C11.5 6 13 5 15 5c4 0 5.5 4 3.5 7.5C19 16.65 12 21 12 21z"/></svg>
      <svg class="heart-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.35-9.5-8.5C.5 9 2 5 6 5c2 0 3.5 1 4.5 2.5C11.5 6 13 5 15 5c4 0 5.5 4 3.5 7.5C19 16.65 12 21 12 21z"/></svg>
      <svg class="heart-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.35-9.5-8.5C.5 9 2 5 6 5c2 0 3.5 1 4.5 2.5C11.5 6 13 5 15 5c4 0 5.5 4 3.5 7.5C19 16.65 12 21 12 21z"/></svg>
    </div>
  </div>

  <div class="board-container">
    <svg class="board-svg" viewBox="0 0 380 600" preserveAspectRatio="xMidYMid meet">
      <defs>
        <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="11" cy="11" r="1.4" fill="var(--grid-dot)"/>
        </pattern>
        <marker id="head" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth" markerWidth="3" markerHeight="3" orient="auto">
          <path d="M0,0 L10,5 L0,10 z" fill="var(--ink)"/>
        </marker>
      </defs>
      <rect width="100%" height="100%" fill="url(#dots)"/>

      <g class="arrow-stroke" marker-end="url(#head)">
        <!-- row 1 -->
        <polyline points="20,40 20,90 60,90"/>
        <polyline points="115,40 115,90 175,90"/>
        <polyline points="200,40 260,40 260,90"/>
        <polyline points="295,40 335,40 335,90"/>

        <!-- row 2 -->
        <polyline points="40,130 110,130"/>
        <polyline points="40,160 95,160"/>
        <polyline points="155,160 155,210 95,210"/>
        <polyline points="200,130 200,200 240,200"/>
        <polyline points="280,130 320,130 320,180"/>

        <!-- row 3 -->
        <polyline points="20,250 80,250"/>
        <polyline points="155,250 215,250"/>
        <polyline points="260,250 260,300 320,300"/>
        <polyline points="100,290 100,330"/>

        <!-- row 4 -->
        <polyline points="40,360 40,400"/>
        <polyline points="115,360 175,360"/>
        <polyline points="220,360 290,360"/>
        <polyline points="155,395 215,395"/>

        <!-- row 5 -->
        <polyline points="80,440 130,440"/>
        <polyline points="180,440 240,440"/>
        <polyline points="290,440 340,440"/>
        <polyline points="60,470 100,470"/>

        <!-- row 6 -->
        <polyline points="160,490 215,490 215,540"/>
        <polyline points="120,510 120,560"/>
        <polyline points="260,490 320,490"/>
        <polyline points="40,540 90,540"/>
        <polyline points="280,560 340,560"/>
      </g>
    </svg>
  </div>

  <nav class="bottombar">
    <button class="btn" aria-label="Hint">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2v.3h6v-.3c0-.7.4-1.5 1-2A7 7 0 0 0 12 2z"/></svg>
      <span>Hint</span>
    </button>
    <button class="btn" aria-label="Paths">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>
      <span>Paths</span>
    </button>
  </nav>
</body>
</html>
