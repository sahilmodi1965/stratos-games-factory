<!doctype html>
<html lang="en" data-theme="default">
<head>
<meta charset="utf-8">
<title>AP — Levels Grid (Progression)</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .grid-stage {
    position: absolute;
    inset: 84px 0 22px 0;
    padding: 16px 28px 0;
    overflow: hidden;
  }
  .tier-pill {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 999px;
    background: var(--button-bg);
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 14px;
  }
  .tier-pill.active {
    background: var(--accent);
    color: #fff;
  }
  .tier-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
  }
  .lvl {
    aspect-ratio: 1;
    border-radius: 18px;
    background: var(--button-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    font-weight: 800;
    color: var(--ink);
    position: relative;
  }
  .lvl .num { font-size: 22px; line-height: 1; }
  .lvl .stars { display: flex; gap: 1px; }
  .lvl .stars svg { width: 11px; height: 11px; color: #f0b400; }
  .lvl.completed { background: rgba(232, 93, 58, 0.1); }
  .lvl.completed .num { color: var(--accent); }
  .lvl.current {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 8px 20px rgba(232, 93, 58, 0.45);
  }
  .lvl.current .num { color: #fff; }
  .lvl.current .stars svg { color: #fff; opacity: 0.5; }
  .lvl.locked { opacity: 0.4; }
  .lvl.locked .num { color: var(--ink-faint); }
  .star-icon { fill: currentColor; }
</style>
</head>
