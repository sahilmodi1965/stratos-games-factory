<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BX — Classic mid-explosion</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .hud-bar {
    position: absolute;
    top: 80px; left: 0; right: 0;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 14px;
    padding: 0 24px;
    align-items: center;
    z-index: 4;
  }
  .stat {
    background: rgba(0,0,0,0.35);
    border: 2px solid rgba(0, 229, 255, 0.4);
    border-radius: 14px;
    padding: 10px 16px;
    backdrop-filter: blur(8px);
  }
  .stat-label {
    font-size: 11px;
    color: var(--cyan);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .stat-value {
    font-size: 24px;
    font-weight: 900;
    line-height: 1;
    margin-top: 2px;
  }
  .level-pill {
    background: linear-gradient(135deg, var(--cyan), #0288D1);
    border-radius: 999px;
    padding: 8px 20px;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    box-shadow: 0 0 20px rgba(0,229,255,0.5);
  }

  .arena {
    position: absolute;
    top: 200px;
    left: 24px;
    right: 24px;
    bottom: 200px;
    background: linear-gradient(180deg, #0f1119 0%, #1A1D24 100%);
    border-radius: 24px;
    border: 2px solid rgba(0, 229, 255, 0.3);
    box-shadow:
      inset 0 0 40px rgba(0,0,0,0.6),
      0 0 60px rgba(0, 229, 255, 0.25);
    overflow: hidden;
  }
  .grid {
    position: absolute;
    inset: 16px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(8, 1fr);
    gap: 6px;
  }
  .blk {
    border-radius: 8px;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.25), inset 0 2px 0 rgba(255,255,255,0.18);
  }
  .blk.cyan { background: linear-gradient(180deg, #4ee5ff, #00b8d4); }
  .blk.pink { background: linear-gradient(180deg, #ff5dba, #c2185b); }
  .blk.orange { background: linear-gradient(180deg, #ffb74d, #f57c00); }
  .blk.green { background: linear-gradient(180deg, #69f0ae, #1de9b6); }
  .blk.purple { background: linear-gradient(180deg, #b388ff, #7c4dff); }
  .blk.yellow { background: linear-gradient(180deg, #ffd54f, #f9a825); }
  .blk.empty { background: transparent; }

  /* explosion overlay */
  .blast {
    position: absolute;
    width: 280px; height: 280px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background:
      radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(255,234,0,0.6) 12%, rgba(255,87,34,0.4) 28%, transparent 60%);
    filter: blur(0.5px);
    pointer-events: none;
    z-index: 3;
  }
  .ring {
    position: absolute;
    width: 320px; height: 320px;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border: 4px solid rgba(0, 229, 255, 0.65);
    border-radius: 50%;
    box-shadow: 0 0 40px var(--cyan), inset 0 0 30px rgba(0,229,255,0.25);
    pointer-events: none;
  }
  .combo {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(-6deg);
    font-size: 88px;
    font-weight: 900;
    line-height: 0.9;
    color: #fff;
    text-shadow:
      0 0 24px var(--cyan),
      0 0 60px var(--magenta),
      6px 6px 0 rgba(0,0,0,0.4);
    letter-spacing: -0.02em;
    z-index: 5;
    text-align: center;
  }
  .combo span { display: block; }
  .combo .x { color: var(--yellow); font-size: 56px; }

  .particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .p {
    position: absolute;
    border-radius: 50%;
    box-shadow: 0 0 12px currentColor;
  }

  .controls {
    position: absolute;
    bottom: 24px;
    left: 24px;
    right: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    z-index: 4;
  }
  .ctrl {
    background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.06));
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 16px;
    padding: 14px 12px;
    text-align: center;
    backdrop-filter: blur(8px);
  }
  .ctrl-label {
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .ctrl-value {
    font-size: 22px;
    font-weight: 900;
    margin-top: 2px;
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="wordmark">BLOX<span class="accent">PLODE</span></div>
  </div>

  <div class="hud-bar">
    <div class="stat">
      <div class="stat-label">Score</div>
      <div class="stat-value">42,180</div>
    </div>
    <div class="level-pill">Classic · 14</div>
    <div class="stat" style="text-align:right">
      <div class="stat-label">Best</div>
      <div class="stat-value">88,420</div>
    </div>
  </div>

  <div class="arena">
    <div class="grid">
      <!-- 6x8 grid, mid-explosion: center cells empty (just exploded), surrounding cells colored -->
      <div class="blk pink"></div><div class="blk cyan"></div><div class="blk orange"></div><div class="blk pink"></div><div class="blk green"></div><div class="blk yellow"></div>
      <div class="blk cyan"></div><div class="blk purple"></div><div class="blk pink"></div><div class="blk yellow"></div><div class="blk cyan"></div><div class="blk orange"></div>
      <div class="blk yellow"></div><div class="blk pink"></div><div class="blk empty"></div><div class="blk empty"></div><div class="blk green"></div><div class="blk cyan"></div>
      <div class="blk purple"></div><div class="blk empty"></div><div class="blk empty"></div><div class="blk empty"></div><div class="blk empty"></div><div class="blk pink"></div>
      <div class="blk orange"></div><div class="blk empty"></div><div class="blk empty"></div><div class="blk empty"></div><div class="blk empty"></div><div class="blk yellow"></div>
      <div class="blk green"></div><div class="blk yellow"></div><div class="blk empty"></div><div class="blk empty"></div><div class="blk purple"></div><div class="blk green"></div>
      <div class="blk pink"></div><div class="blk cyan"></div><div class="blk orange"></div><div class="blk green"></div><div class="blk pink"></div><div class="blk cyan"></div>
      <div class="blk yellow"></div><div class="blk purple"></div><div class="blk pink"></div><div class="blk orange"></div><div class="blk yellow"></div><div class="blk green"></div>
    </div>

    <div class="blast"></div>
    <div class="ring"></div>

    <div class="particles" aria-hidden="true">
      <div class="p" style="background:#00E5FF; color:#00E5FF; width:12px; height:12px; top:18%; left:32%"></div>
      <div class="p" style="background:#D500F9; color:#D500F9; width:14px; height:14px; top:25%; left:72%"></div>
      <div class="p" style="background:#FFA726; color:#FFA726; width:10px; height:10px; top:40%; left:18%"></div>
      <div class="p" style="background:#FF1744; color:#FF1744; width:11px; height:11px; top:62%; left:78%"></div>
      <div class="p" style="background:#FFCA28; color:#FFCA28; width:9px; height:9px; top:78%; left:42%"></div>
      <div class="p" style="background:#00E5FF; color:#00E5FF; width:8px; height:8px; top:32%; left:88%"></div>
      <div class="p" style="background:#D500F9; color:#D500F9; width:13px; height:13px; top:70%; left:14%"></div>
      <div class="p" style="background:#FFA726; color:#FFA726; width:10px; height:10px; top:48%; left:62%"></div>
    </div>

    <div class="combo">
      <span class="x">×4</span>
      <span>COMBO</span>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl">
      <div class="ctrl-label">Chain</div>
      <div class="ctrl-value">×4</div>
    </div>
    <div class="ctrl">
      <div class="ctrl-label">Cleared</div>
      <div class="ctrl-value">38</div>
    </div>
  </div>
</body>
</html>
