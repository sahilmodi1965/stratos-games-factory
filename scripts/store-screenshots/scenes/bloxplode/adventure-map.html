<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BX — Adventure map (Level 45)</title>
<link rel="stylesheet" href="_shared.css">
<style>
  body {
    background:
      radial-gradient(ellipse 80% 50% at 50% 90%, rgba(0,229,255,0.12), transparent 60%),
      linear-gradient(180deg, #2a3380 0%, #3E50A4 60%, #1a2050 100%);
  }
  .header {
    position: absolute;
    top: 80px; left: 0; right: 0;
    text-align: center;
    z-index: 4;
  }
  .header .title {
    font-weight: 900;
    font-size: 32px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-shadow: 0 0 20px var(--cyan);
  }
  .header .progress {
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 700;
    margin-top: 6px;
  }
  .header .progress strong { color: var(--yellow); }

  .map {
    position: absolute;
    top: 180px;
    left: 0; right: 0;
    bottom: 60px;
    overflow: hidden;
  }
  .row {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 16px;
  }
  .node {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 16px;
    position: relative;
  }
  .node.completed {
    background: linear-gradient(135deg, #4ee5ff, #00b8d4);
    color: #001a26;
    box-shadow: 0 4px 12px rgba(0,229,255,0.3), inset 0 -3px 0 rgba(0,0,0,0.2);
  }
  .node.current {
    background: linear-gradient(135deg, #ffd54f, #f57c00);
    color: #2a1500;
    box-shadow:
      0 0 0 4px rgba(255, 215, 64, 0.25),
      0 0 30px rgba(255, 215, 64, 0.6),
      0 6px 20px rgba(0,0,0,0.4),
      inset 0 -3px 0 rgba(0,0,0,0.2);
    transform: scale(1.15);
    z-index: 2;
  }
  .node.locked {
    background: rgba(0,0,0,0.4);
    color: rgba(255,255,255,0.25);
    border: 2px solid rgba(255,255,255,0.08);
  }
  .node.locked::after {
    content: '🔒';
    position: absolute;
    font-size: 14px;
    opacity: 0.5;
  }
  .node.locked .num { display: none; }
  .stars {
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 1px;
  }
  .stars svg { width: 10px; height: 10px; color: #FFD54F; }

  .play-cta {
    position: absolute;
    bottom: 24px;
    left: 24px;
    right: 24px;
    background: linear-gradient(180deg, #FFCA28, #F57C00);
    border-radius: 18px;
    padding: 18px 24px;
    text-align: center;
    box-shadow: 0 8px 24px rgba(245, 124, 0, 0.45), inset 0 -4px 0 rgba(0,0,0,0.2);
    z-index: 5;
  }
  .play-cta .label {
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #2a1500;
  }
  .play-cta .level {
    font-weight: 700;
    font-size: 13px;
    color: rgba(42,21,0,0.7);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
