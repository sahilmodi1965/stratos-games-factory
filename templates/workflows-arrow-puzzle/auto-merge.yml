name: Auto-merge daemon PRs
# When a daemon-opened PR (head branch starts with "auto/") passes CI AND only
# touches data/presentation files, auto-merge it. Logic-touching PRs (.js, .ts,
# .html) are held for human review.
# Deployed by the Stratos Games Factory — do not hand-edit.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-merge:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' && startsWith(github.event.workflow_run.head_branch, 'auto/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Find PR for head branch
        id: find
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr=$(gh pr list \
            --repo "${{ github.repository }}" \
            --head "${{ github.event.workflow_run.head_branch }}" \
            --state open \
            --json number --jq '.[0].number // ""')
          if [ -z "$pr" ]; then
            echo "No open PR for branch ${{ github.event.workflow_run.head_branch }}"
            echo "pr=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Found PR #$pr"
          echo "pr=$pr" >> "$GITHUB_OUTPUT"

      - name: Inspect changed files
        id: safety
        if: steps.find.outputs.pr != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr='${{ steps.find.outputs.pr }}'
          changed=$(gh pr diff "$pr" --repo "${{ github.repository }}" --name-only)
          echo "Changed files:"
          echo "$changed"
          echo

          unsafe=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              # Per-game hard exclusions (must never auto-merge)
              packages/*) unsafe="$unsafe $f" ;;
              games/arrow-puzzle/src/game/*) unsafe="$unsafe $f" ;;
              games/arrow-puzzle/src/rendering/*) unsafe="$unsafe $f" ;;
              games/arrow-puzzle/src/main.js) unsafe="$unsafe $f" ;;
              prototypes/*) unsafe="$unsafe $f" ;;
              # Generic logic/structure files
              *.js|*.mjs|*.cjs|*.ts|*.tsx|*.jsx|*.html|*.htm|*.vue|*.svelte)
                unsafe="$unsafe $f" ;;
              *) ;;
            esac
          done <<< "$changed"

          if [ -n "$unsafe" ]; then
            echo "Unsafe paths detected (will NOT auto-merge):"
            for u in $unsafe; do echo "  $u"; done
            echo "safe=false" >> "$GITHUB_OUTPUT"
          else
            echo "All changes are safe-path only — eligible for auto-merge."
            echo "safe=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge PR
        if: steps.safety.outputs.safe == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr='${{ steps.find.outputs.pr }}'
          gh pr edit "$pr" --repo "${{ github.repository }}" --add-label "auto-merged"
          gh pr comment "$pr" --repo "${{ github.repository }}" \
            --body "🤖 **Auto-merged by Stratos Games Factory** — diff only touches safe paths (no .js/.ts/.html, no \`packages/\`, no \`src/game/\`, no \`src/rendering/\`) and CI passed."
          gh pr merge "$pr" --repo "${{ github.repository }}" --merge --delete-branch

      - name: Comment why not merged
        if: steps.find.outputs.pr != '' && steps.safety.outputs.safe == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr='${{ steps.find.outputs.pr }}'
          marker='<!-- stratos-auto-merge-skipped -->'
          existing=$(gh pr view "$pr" --repo "${{ github.repository }}" --json comments \
            --jq "[.comments[] | select(.body | contains(\"$marker\"))] | length")
          if [ "$existing" = "0" ]; then
            gh pr comment "$pr" --repo "${{ github.repository }}" --body "$marker
🤖 **Stratos auto-merge skipped** — diff touches logic/structure files (.js/.ts/.html or core game directories). Holding for human review."
          fi
