name: CI
# Verifies the build on every push to main and every PR.
# Catches broken direct pushes from collaborators immediately.
# Deployed by the Stratos Games Factory — do not hand-edit.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm install

      - name: Validate
        # Runs scripts/validate.js — the AP-side gate chain (paths +
        # difficulty schema + smoke-runtime + smoke-share-image). Catches
        # generator/regression bugs that pure `npm run build` would miss.
        # Issue #69 — was missing on AP main 2026-04-20 → #184/#185 went
        # red on direct push because no CI step exercised the validators.
        run: npm run validate

      - name: Build
        run: npm run build
