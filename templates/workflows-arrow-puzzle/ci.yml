name: CI
# Verifies the build on every push to main and every PR.
# Catches broken direct pushes from collaborators immediately.
# Deployed by the Stratos Games Factory — do not hand-edit.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm install

      - name: Build
        run: npm run build
