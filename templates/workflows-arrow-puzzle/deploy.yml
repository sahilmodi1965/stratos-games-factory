name: Deploy main to GitHub Pages
# Builds the project (npm run build → docs/) then mirrors docs/ to gh-pages.
# Uses keep_files=true so PR preview directories under /pr/* are preserved.
# Deployed by the Stratos Games Factory — do not hand-edit.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify docs/ exists
        run: |
          if [ ! -d docs ]; then
            echo "::error::docs/ does not exist after build — npm run build may not be writing to docs/"
            exit 1
          fi
          ls -la docs/ | head -20

      - name: Mirror docs/ to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
          commit_message: "deploy: main → gh-pages (${{ github.sha }})"
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
