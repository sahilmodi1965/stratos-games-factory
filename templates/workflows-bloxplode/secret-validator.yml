name: Secret Validator
# Validates that every documented tier-2 secret is populated in this repo.
# Logs secret LENGTHS, never values. Comments the result on the supplied
# [secret-onboarding] issue.
#
# Triggered manually by Ripon after he runs `gh secret set` for the game:
#   gh workflow run secret-validator.yml --repo <owner/repo> -f onboarding_issue=<N>
#
# Factory source: templates/workflows-<game>/secret-validator.yml
# Spec: council/SECRETS.md + templates/secret-onboarding-issue.md
# Factory-improvement #65. Do not hand-edit — deployed by the Stratos Games Factory.

on:
  workflow_dispatch:
    inputs:
      onboarding_issue:
        description: '[secret-onboarding] issue number to comment on (required)'
        required: true
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    name: presence-check tier-2 secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check every tier-2 secret slot
        id: check
        env:
          ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
          ANDROID_SIGNING_KEY_ALIAS:       ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD:    ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
          ANDROID_SIGNING_STORE_PASSWORD:  ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          APP_STORE_CONNECT_KEY_ID:        ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:     ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8:        ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
          FIREBASE_SA_JSON:                ${{ secrets.FIREBASE_SA_JSON }}
          ADMOB_API_SECRET:                ${{ secrets.ADMOB_API_SECRET }}
          LINKRUNNER_API_TOKEN:            ${{ secrets.LINKRUNNER_API_TOKEN }}
          APPLOVIN_MAX_SDK_KEY:            ${{ secrets.APPLOVIN_MAX_SDK_KEY }}
          LR_SECRET_KEY:                   ${{ secrets.LR_SECRET_KEY }}
          LR_KEY_ID:                       ${{ secrets.LR_KEY_ID }}
        run: |
          set -euo pipefail
          present=0
          missing=0
          report_file=$(mktemp)

          check() {
            local name="$1"
            local val="$2"
            if [[ -n "$val" ]]; then
              printf -- "- ✅ \`%s\` — present (length %d)\n" "$name" "${#val}" >> "$report_file"
              present=$((present + 1))
            else
              printf -- "- ❌ \`%s\` — MISSING\n" "$name" >> "$report_file"
              missing=$((missing + 1))
            fi
          }

          check ANDROID_SIGNING_KEYSTORE_BASE64 "$ANDROID_SIGNING_KEYSTORE_BASE64"
          check ANDROID_SIGNING_KEY_ALIAS       "$ANDROID_SIGNING_KEY_ALIAS"
          check ANDROID_SIGNING_KEY_PASSWORD    "$ANDROID_SIGNING_KEY_PASSWORD"
          check ANDROID_SIGNING_STORE_PASSWORD  "$ANDROID_SIGNING_STORE_PASSWORD"
          check APP_STORE_CONNECT_KEY_ID        "$APP_STORE_CONNECT_KEY_ID"
          check APP_STORE_CONNECT_ISSUER_ID     "$APP_STORE_CONNECT_ISSUER_ID"
          check APP_STORE_CONNECT_KEY_P8        "$APP_STORE_CONNECT_KEY_P8"
          check FIREBASE_SA_JSON                "$FIREBASE_SA_JSON"
          check ADMOB_API_SECRET                "$ADMOB_API_SECRET"
          check LINKRUNNER_API_TOKEN            "$LINKRUNNER_API_TOKEN"
          check APPLOVIN_MAX_SDK_KEY            "$APPLOVIN_MAX_SDK_KEY"
          check LR_SECRET_KEY                   "$LR_SECRET_KEY"
          check LR_KEY_ID                       "$LR_KEY_ID"

          total=$((present + missing))
          echo "present=$present"  >> "$GITHUB_OUTPUT"
          echo "missing=$missing"  >> "$GITHUB_OUTPUT"
          echo "total=$total"      >> "$GITHUB_OUTPUT"
          echo "report_file=$report_file" >> "$GITHUB_OUTPUT"

          echo "::notice::$present/$total tier-2 secrets present, $missing missing"
          cat "$report_file"

      - name: Comment result on [secret-onboarding] issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const present = '${{ steps.check.outputs.present }}';
            const missing = '${{ steps.check.outputs.missing }}';
            const total   = '${{ steps.check.outputs.total }}';
            const report  = fs.readFileSync('${{ steps.check.outputs.report_file }}', 'utf8');
            const status  = parseInt(missing) === 0 ? '✅ ALL PRESENT' : `⚠️  ${missing} MISSING`;
            const body = [
              `## 🤖 Secret validator — ${status}`,
              ``,
              `**${present}/${total} tier-2 secrets populated** (triggered by @${{ github.actor }}).`,
              ``,
              report,
              ``,
              `<sub>Values never logged — only lengths. Workflow: \`.github/workflows/secret-validator.yml\`. Spec: [council/SECRETS.md](https://github.com/sahilmodi1965/stratos-games-factory/blob/main/council/SECRETS.md).</sub>`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ inputs.onboarding_issue }}'),
              body,
            });

      - name: Fail job if any secret missing
        if: steps.check.outputs.missing != '0'
        run: |
          echo "::error::${{ steps.check.outputs.missing }} tier-2 secret(s) missing — see [secret-onboarding] comment for details"
          exit 1
