name: Rebase cascade
# When a PR merges to main, walk every open auto/* PR in this repo and try
# to rebase it against the new main. Clean rebases get force-pushed (which
# re-triggers CI + auto-merge.yml). Conflicting rebases get labeled
# `needs-rebase` and commented; human takes over.
#
# This turns "one merge = one PR unblocked" into "one merge = a cascade of
# downstream PRs unblocked." Capped at 10 cascaded rebases per trigger so
# a buggy run can't go unbounded. Concurrency group serializes runs per
# repo so cascade triggers don't overlap.
#
# Factory-improvement issue: sahilmodi1965/stratos-games-factory#24
# Deployed by the Stratos Games Factory — do not hand-edit.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: rebase-cascade-${{ github.repository }}
  cancel-in-progress: false

jobs:
  cascade:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "stratos-rebase-cascade[bot]"
          git config user.email "rebase-cascade@stratosgames.local"

      - name: Rebase open auto/* PRs onto new main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGED_PR: ${{ github.event.pull_request.number }}
          MAX_CASCADE: 10
        run: |
          set -uo pipefail

          # Ignore the just-merged PR (it's closed so it won't appear in --state open,
          # but the env var lets us reference it in comments).
          open_prs=$(gh pr list --state open \
            --repo "${{ github.repository }}" \
            --json number,headRefName,labels,title \
            --jq '[.[] | select(.headRefName | startswith("auto/"))] | sort_by(.number)')

          total=$(echo "$open_prs" | jq 'length')
          echo "::notice::Found $total open auto/* PRs to attempt cascading after #$MERGED_PR merged"
          if [ "$total" -eq 0 ]; then
            echo "Nothing to cascade."
            exit 0
          fi

          count=0
          rebased_list=""
          conflict_list=""

          while IFS= read -r pr; do
            if [ "$count" -ge "$MAX_CASCADE" ]; then
              echo "::warning::Reached MAX_CASCADE=$MAX_CASCADE — stopping"
              break
            fi

            pr_num=$(echo "$pr" | jq -r '.number')
            pr_branch=$(echo "$pr" | jq -r '.headRefName')
            pr_labels=$(echo "$pr" | jq -r '.labels | map(.name) | join(",")')

            # Skip PRs already blocked or manual
            if echo "$pr_labels" | grep -qE '(^|,)(needs-rebase|ci-red|wip|hold)(,|$)'; then
              echo "PR #$pr_num: skip (labels: $pr_labels)"
              continue
            fi

            echo "PR #$pr_num ($pr_branch): attempting rebase"

            # Fetch the PR branch into a scratch ref so we never touch main
            if ! git fetch origin "$pr_branch:rebase-work/$pr_num" 2>&1; then
              echo "PR #$pr_num: fetch failed, skipping"
              continue
            fi

            git checkout "rebase-work/$pr_num"

            # Attempt the rebase
            if git rebase origin/main 2>&1; then
              # Only push if the rebase actually moved commits
              if git diff --quiet "origin/$pr_branch" HEAD; then
                echo "PR #$pr_num: already up to date with main — nothing to push"
              else
                echo "PR #$pr_num: rebase clean, force-pushing"
                if git push --force-with-lease origin "HEAD:$pr_branch" 2>&1; then
                  count=$((count + 1))
                  rebased_list="$rebased_list #$pr_num"
                  gh pr comment "$pr_num" --repo "${{ github.repository }}" \
                    --body "🤖 **Rebase cascade:** cleanly rebased after #$MERGED_PR merged. CI will re-run; auto-merge will fire if the updated diff passes its safety gate."
                else
                  echo "::error::PR #$pr_num: push failed"
                  gh pr comment "$pr_num" --repo "${{ github.repository }}" \
                    --body "🤖 **Rebase cascade:** clean rebase against main (after #$MERGED_PR), but force-push failed. Check workflow logs."
                fi
              fi
            else
              echo "PR #$pr_num: rebase conflict, aborting"
              git rebase --abort 2>/dev/null || true
              conflict_list="$conflict_list #$pr_num"
              gh pr edit "$pr_num" --repo "${{ github.repository }}" --add-label "needs-rebase" 2>/dev/null || true
              gh pr comment "$pr_num" --repo "${{ github.repository }}" \
                --body "🤖 **Rebase cascade:** conflicts with main after #$MERGED_PR merged. Requires manual rebase. Labeled \`needs-rebase\`; cascade will skip this PR until the label is removed."
            fi

            # Reset for next iteration
            git checkout main --quiet
            git branch -D "rebase-work/$pr_num" 2>/dev/null || true

          done < <(echo "$open_prs" | jq -c '.[]')

          echo
          echo "::notice::Cascade complete — rebased:$rebased_list conflicts:$conflict_list"
